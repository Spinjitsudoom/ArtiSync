app-id: com.musicmanager.MusicManager
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: MusicManager

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --filesystem=xdg-music:rw
  - --filesystem=xdg-download:rw
  - --filesystem=/run/media:rw
  - --filesystem=/mnt:rw
  - --talk-name=org.freedesktop.Notifications

modules:
  # nlohmann/json is header-only; not in KDE SDK so we build+install it first.
  - name: nlohmann-json
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DJSON_BuildTests=OFF
      - -DJSON_Install=ON
    sources:
      - type: git
        url: https://github.com/nlohmann/json.git
        tag: v3.11.3

  # Main application. curl and taglib come from the KDE SDK (6.10).
  - name: MusicManager
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    post-install:
      - install -Dm644 resources/MusicManager.png
          /app/share/icons/hicolor/256x256/apps/com.musicmanager.MusicManager.png
      - install -Dm644 flatpak/com.musicmanager.MusicManager.desktop
          /app/share/applications/com.musicmanager.MusicManager.desktop
      - install -Dm644 flatpak/com.musicmanager.MusicManager.metainfo.xml
          /app/share/metainfo/com.musicmanager.MusicManager.metainfo.xml
    sources:
      - type: dir
        path: ..
