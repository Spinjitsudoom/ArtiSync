<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0a2e"/>
      <stop offset="100%" stop-color="#071928"/>
    </linearGradient>
    <linearGradient id="legs" x1="256" y1="128" x2="256" y2="378" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bars" x1="256" y1="205" x2="256" y2="267" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="apexGrad" cx="256" cy="128" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="256" cy="248" r="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="apexGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#bgGlow)"/>

  <!-- A letterform — two legs -->
  <g filter="url(#glow)">
    <line x1="172" y1="378" x2="256" y2="128"
          stroke="url(#legs)" stroke-width="30" stroke-linecap="round"/>
    <line x1="340" y1="378" x2="256" y2="128"
          stroke="url(#legs)" stroke-width="30" stroke-linecap="round"/>
  </g>

  <!-- Equalizer bars replacing the A crossbar (centered at y≈236) -->
  <g fill="url(#bars)" filter="url(#glow)">
    <rect x="222" y="224" width="12" height="24"  rx="6"/>
    <rect x="238" y="214" width="12" height="44"  rx="6"/>
    <rect x="254" y="205" width="12" height="62"  rx="6"/>
    <rect x="270" y="216" width="12" height="40"  rx="6"/>
    <rect x="286" y="226" width="12" height="20"  rx="6"/>
  </g>

  <!-- Apex glow dot -->
  <circle cx="256" cy="128" r="30" fill="url(#apexGrad)" filter="url(#apexGlow)" opacity="0.85"/>
  <circle cx="256" cy="128" r="9"  fill="#f5f0ff"/>
</svg>
