name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Configure
        working-directory: "c++ source code"
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: "c++ source code"
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt (bundle DLLs)
        working-directory: "c++ source code"
        run: windeployqt --release build\Release\ArtiSync.exe

      - name: Build installer (Inno Setup)
        working-directory: "c++ source code"
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ArtiSync.iss'

      - name: Package portable zip
        working-directory: "c++ source code"
        shell: pwsh
        run: Compress-Archive -Path build\Release\* -DestinationPath ArtiSync-Portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ArtiSync-Setup
          path: "c++ source code/ArtiSync-Setup.exe"

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: ArtiSync-Portable
          path: "c++ source code/ArtiSync-Portable.zip"

  # ── Attach to GitHub Release (tag pushes only) ────────────────────────────────
  release:
    name: Publish to Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "ArtiSync ${{ github.ref_name }}" \
            --generate-notes \
            "artifacts/ArtiSync-Setup.exe" \
            "artifacts/ArtiSync-Portable.zip" \
          || gh release upload "${{ github.ref_name }}" \
            "artifacts/ArtiSync-Setup.exe" \
            "artifacts/ArtiSync-Portable.zip" \
            --clobber
